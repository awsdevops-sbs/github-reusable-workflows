name:  Release - Reusable
on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
      npm_install:
        required: true
        type: boolean

    secrets:
      vault_token:
        required: true

jobs:
  CI_Steps:
    runs-on: [self-hosted]

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Install NodeJS modules
        run: npm install
        if: ${{ inputs.npm_install }}

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v2
        id: vault-secrets
        with:
          url: http://vault.awsdevops16297.sbs:8200/
          token: ${{ secrets.vault_token }}
          tlsSkipVerify: true
          secrets: |
            common/data/common sonarqube_user | sonarqube_user;
            common/data/common sonarqube_password | sonarqube_password;

      - name: Code Lint
        run: echo "Ok"

      - name: Code Build
        run: echo "Ok"


      - name: Code Unit Test
        run: echo npm runtest:unit

      - name: Code integration Test
        run: echo npm runtest:integration

      - name: Code Review
        run: echo /opt/sonar-scanner-5.0.1.3006-linux/bin/sonar-scanner -Dsonar.host.url=http://sonarqube-internal.awsdevops16297.sbs:9000 -Dsonar.projectKey=${{ inputs.project_name }} -Dsonar.qualitygate.wait=true -Dsonar.login=${{ steps.vault-secrets.outputs.sonarqube_user}} -Dsonar.password=${{ steps.vault-secrets.outputs.sonarqube_password }}

      - name: Release software
        run: echo "Ok"
        if: ${{ startsWith(github.ref, 'refs/tags/') }}



